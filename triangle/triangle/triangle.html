<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 100px;
            text-align: center;
            color: white;
        }
        input, select {
            height: 40px;
            width: 300px;
            font-size: 20px;
            font-weight: bolder;
            text-align: center;
            background-color: antiquewhite;
            border-radius: 20px;
            margin: 10px;
        }
        button {
            height: 50px;
            width: 120px;
            font-size: 18px;
            margin: 10px;
            color: white;
            background-color: rgb(65, 52, 52);
            border-radius: 20px;
        }
        #result {
            margin-top: 30px;
            font-size: 20px;
            color: lightgreen;
            
        }
        </style>
</head>
<body>
    <h2 style="margin-bottom: 30px; font-size: 40px;">Triangle Master</h2> 
     <h2 style="margin-bottom: 30px; font-size: 15px ; color: rgb(255, 205, 158);">Enter the angles of triangle</h2>
     <input type="number" placeholder="Enter the 1'st angle" id="a">
     <br>
     <input type="number" placeholder="Enter the 2'nd angle" id="b">
     <br>
     <input type="number" placeholder="Enter the 3'rd angle" id="c">
     <br>
     <button onclick="find()">Find</button>
     <div id="result"></div>
     <script>
        function find(){
            let a = parseInt(document.getElementById("a").value);
            let b = parseInt(document.getElementById("b").value);
            let c = parseInt(document.getElementById("c").value);
              let result="";
              if(a+b+c!=180){
                result=" Not a valid triangle";
              }
            else if( a===60 && b===60 && c===60){
                result ="Equilaterial triangle";
            }
            else if( a===90 || b===90 || c ===90){
                if(a===b || b===c|| a===c){
                    result = "Right isosceles triangle";
                }
                else{
                    result = "Right triangle";
                }
            }
            else if( a===b || b===c || c===a){
                result = " Isosceles triangle";
            }
            else{
                result = " Scalene triangle";
            }
            document.getElementById("result").innerHTML= result;
        }
     </script>
</body>
</html>
