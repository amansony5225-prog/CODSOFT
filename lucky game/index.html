<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lucky Color Game</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .game-container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    h1 { 
      color: #333; 
    }

    label { 
      display: block; 
      margin-top: 10px; 
      text-align: left; 
    }

    input { 
      width: 100%; 
      padding: 8px; 
      margin-top: 5px; 
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover { 
      background: #45a049; 
    }

    .result { 
      margin-top: 15px; 
      font-weight: bold; 
    }
  </style>
</head>

<body>

  <div class="game-container">
    <h1>Lucky Color Game</h1>

    <label>Your Name:</label>
    <input type="text" id="name">

    <label>Date of Birth:</label>
    <input type="date" id="dob">

    <button onclick="findLucky()">Find Lucky Color & Day</button>

    <div class="result" id="result"></div>
  </div>

  <script>

    function findLucky() {

      let name = document.getElementById("name").value;
      let dob = document.getElementById("dob").value;
      let resultDiv = document.getElementById("result");

      if (name === "" || dob === "") {
        alert("Please enter your name and date of birth");
        return;
      }

      // Step 1: Extract digits using basic loop
      let digits = [];

      for (let i = 0; i < dob.length; i++) {

        if (dob[i] !== "-") {   // skip hyphen
          digits.push(Number(dob[i]));
        }

      }

      // Step 2: Sum digits
      let sum = 0;

      for (let i = 0; i < digits.length; i++) {
        sum += digits[i];
      }

      // Step 3: Find remainder
      let remainder = sum % 7;

      // Step 4: Color mapping
      let colors = {
        1: "Yellow",
        2: "Blue",
        3: "Red",
        4: "Green",
        5: "Purple",
        6: "Orange",
        0: "Pink"
      };

      // Step 5: Day mapping
      let days = {
        1: "Sunday",
        2: "Monday",
        3: "Tuesday",
        4: "Wednesday",
        5: "Thursday",
        6: "Friday",
        0: "Saturday"
      };

      let luckyColor = colors[remainder];
      let luckyDay = days[remainder];

      resultDiv.innerHTML = name + " your lucky color is " + luckyColor +
                            " and your lucky day is " + luckyDay;

      resultDiv.style.color = luckyColor.toLowerCase();
    }

  </script>

</body>
</html>
